workflows:
  altstore-unsigned-ipa:
    name: LiftKit — Unsigned IPA (AltStore)
    max_build_duration: 60

    environment:
      xcode: 16.2
      groups: []

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    scripts:
      - name: Set build number from git commit count
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "Setting CFBundleVersion to $BUILD"
          PLIST="LiftKit/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          fi

      - name: Build app
        script: |
          set -eo pipefail
          xcodebuild build \
            -scheme LiftKit \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$CM_BUILD_DIR/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_ENTITLEMENTS="" \
            2>&1 | tee /tmp/xcodebuild.log

          APP_PATH="$CM_BUILD_DIR/build/Build/Products/Release-iphoneos/LiftKit.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App bundle not found at: $APP_PATH"
            grep -E "error:" /tmp/xcodebuild.log | tail -20
            exit 1
          fi
          echo "BUILD OK: $(ls -la "$APP_PATH")"

      - name: Sign and package IPA
        script: |
          LOG=/tmp/packaging.log
          exec > >(tee "$LOG") 2>&1
          set -eo pipefail

          APP_PATH="$CM_BUILD_DIR/build/Build/Products/Release-iphoneos/LiftKit.app"
          IPA_PATH="$CM_BUILD_DIR/LiftKit_unsigned.ipa"

          echo "=== App bundle contents ==="
          ls -la "$APP_PATH/"

          echo "=== Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist"

          echo "=== Ad-hoc signing (no entitlements) ==="
          # Create empty entitlements so codesign doesn't inherit any restricted ones
          cat > /tmp/empty.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict/></plist>
          EOF
          codesign --force --deep --sign - --entitlements /tmp/empty.entitlements "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | head -10

          echo "=== Packaging ==="
          PAYLOAD_DIR="$CM_BUILD_DIR/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          /usr/bin/ditto "$APP_PATH" "$PAYLOAD_DIR/LiftKit.app"
          /usr/bin/ditto -c -k --keepParent "$PAYLOAD_DIR" "$IPA_PATH"

          echo "=== IPA created ==="
          ls -lh "$IPA_PATH"
          unzip -l "$IPA_PATH" | head -20

      - name: Run unit tests
        script: |
          xcodebuild test \
            -scheme LiftKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:LiftKitTests \
            2>&1 | tee /tmp/test.log || true
        ignore_failure: true

    artifacts:
      - "$CM_BUILD_DIR/LiftKit_unsigned.ipa"
      - "/tmp/xcodebuild.log"
      - "/tmp/packaging.log"
      - "/tmp/test.log"

    publishing:
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true
