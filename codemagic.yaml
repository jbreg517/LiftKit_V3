workflows:
  altstore-unsigned-ipa:
    name: LiftKit — Unsigned IPA (AltStore)
    max_build_duration: 60

    environment:
      xcode: 16.2
      groups: []

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    scripts:
      - name: Set build number from git commit count
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "Setting CFBundleVersion to $BUILD"
          PLIST="LiftKit/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          fi

      - name: Build app
        script: |
          set -eo pipefail
          xcodebuild build \
            -scheme LiftKit \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$CM_BUILD_DIR/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/xcodebuild.log

          APP_PATH="$CM_BUILD_DIR/build/Build/Products/Release-iphoneos/LiftKit.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App bundle not found at: $APP_PATH"
            grep -E "error:" /tmp/xcodebuild.log | tail -20
            exit 1
          fi
          echo "BUILD OK: $APP_PATH"

      - name: Ad-hoc sign and package IPA
        script: |
          set -eo pipefail
          APP_PATH="$CM_BUILD_DIR/build/Build/Products/Release-iphoneos/LiftKit.app"
          IPA_PATH="$CM_BUILD_DIR/LiftKit_unsigned.ipa"

          # Ad-hoc sign — creates _CodeSignature/ so AltStore can re-sign
          echo "Ad-hoc signing..."
          codesign --force --deep --sign - "$APP_PATH"
          echo "Signature:"
          codesign -dv "$APP_PATH" 2>&1 | head -5

          # Verify binary
          BUNDLE_EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist")
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "CFBundleExecutable: $BUNDLE_EXEC"
          echo "CFBundleIdentifier: $BUNDLE_ID"
          echo "Binary size: $(wc -c < "$APP_PATH/$BUNDLE_EXEC") bytes"
          echo "App contents:"
          ls -la "$APP_PATH/"

          # Package using ditto (preserves permissions and symlinks)
          PAYLOAD_DIR="$CM_BUILD_DIR/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          ditto "$APP_PATH" "$PAYLOAD_DIR/LiftKit.app"
          ditto -c -k --keepParent "$PAYLOAD_DIR" "$IPA_PATH"

          echo "IPA: $(ls -lh "$IPA_PATH")"
          echo "IPA contents:"
          unzip -l "$IPA_PATH" | head -25

      - name: Run unit tests
        script: |
          xcodebuild test \
            -scheme LiftKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:LiftKitTests \
            2>&1 | tee /tmp/test.log || true
        ignore_failure: true

    artifacts:
      - "$CM_BUILD_DIR/LiftKit_unsigned.ipa"
      - "/tmp/xcodebuild.log"
      - "/tmp/test.log"

    publishing:
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true
