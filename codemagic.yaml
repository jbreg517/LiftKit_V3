workflows:
  altstore-unsigned-ipa:
    name: LiftKit — Unsigned IPA (AltStore)
    max_build_duration: 60

    environment:
      xcode: 16.2
      groups: []

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set build number from git commit count
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "Setting CFBundleVersion to $BUILD"
          PLIST="LiftKit/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          fi

      - name: Build unsigned archive
        script: |
          set -eo pipefail
          xcodebuild archive \
            -scheme LiftKit \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/LiftKit.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="--timestamp=none" \
            2>&1 | tee /tmp/xcodebuild.log
          # Verify the archive actually contains an app
          if [ ! -d "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications" ]; then
            echo "ERROR: Archive produced no app bundle. Build failed."
            cat /tmp/xcodebuild.log | grep -E "error:|Build FAILED" | tail -40
            exit 1
          fi

      - name: Package as unsigned .ipa for AltStore
        script: |
          set -eo pipefail
          APP_PATH=$(find "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive"
            exit 1
          fi
          echo "Packaging: $APP_PATH"
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r "LiftKit_unsigned.ipa" Payload
          echo "IPA created: $CM_BUILD_DIR/LiftKit_unsigned.ipa"
          ls -lh "$CM_BUILD_DIR/LiftKit_unsigned.ipa"

      - name: Run unit tests
        script: |
          set -eo pipefail
          xcodebuild test \
            -scheme LiftKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:LiftKitTests \
            2>&1 | tee /tmp/test.log || true
        ignore_failure: true

    artifacts:
      - "$CM_BUILD_DIR/LiftKit_unsigned.ipa"
      - "$CM_BUILD_DIR/LiftKit.xcarchive"
      - "/tmp/xcodebuild.log"
      - "/tmp/test.log"

    publishing:
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true
