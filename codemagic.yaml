workflows:
  altstore-unsigned-ipa:
    name: LiftKit — Unsigned IPA (AltStore)
    max_build_duration: 60

    environment:
      xcode: 16.2
      groups: []

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Set version and build number
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          VERSION=$(grep -oE 'static let current = "[0-9.]+"' LiftKit/Views/Settings/SettingsView.swift | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Version $VERSION, build $BUILD"
          PLIST="LiftKit/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
            [ -n "$VERSION" ] && /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          fi
          # The widget extension's version must match the app's.
          WIDGET_PLIST="LiftKitWidgets/Info.plist"
          if [ -f "$WIDGET_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$WIDGET_PLIST"
            [ -n "$VERSION" ] && /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$WIDGET_PLIST"
          fi

      - name: Build unsigned archive
        script: |
          # NOTE: pipefail only (no `set -e`). With `set -e`, a non-zero
          # xcodebuild exit aborted the script *before* the error grep below
          # ever ran, so failures showed status 65 with no error lines. Capture
          # the exit code explicitly and always print the compiler errors.
          set -o pipefail
          xcodebuild archive \
            -scheme LiftKit \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/LiftKit.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="--timestamp=none" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            ENABLE_PREVIEWS=NO \
            2>&1 | tee /tmp/xcodebuild.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ] || [ ! -d "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications" ]; then
            echo "===== BUILD FAILED (xcodebuild status $STATUS) — error lines: ====="
            grep -E "error:|Build FAILED|ARCHIVE FAILED|Undefined symbol" /tmp/xcodebuild.log | tail -60
            exit 1
          fi

      - name: Package as unsigned .ipa for AltStore
        script: |
          set -eo pipefail
          APP_PATH=$(find "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive"
            exit 1
          fi
          echo "Packaging: $APP_PATH"
          # Verify it's a device binary (arm64), not simulator
          file "$APP_PATH/$(basename "$APP_PATH" .app)"
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          # Unique, identifiable filename so re-downloads never collide:
          # LiftKit_v<AppVersion>_b<commitCount>.ipa
          BUILD=$(git rev-list --count HEAD)
          VERSION=$(grep -oE 'static let current = "[0-9.]+"' LiftKit/Views/Settings/SettingsView.swift | grep -oE '[0-9]+\.[0-9]+' | head -1)
          [ -z "$VERSION" ] && VERSION="0.00"
          IPA_NAME="LiftKit_v${VERSION}_b${BUILD}.ipa"
          # Use ditto instead of zip — avoids __MACOSX metadata that breaks AltStore's IPA parser
          ditto -c -k --sequesterRsrc --keepParent \
            "$CM_BUILD_DIR/Payload" \
            "$CM_BUILD_DIR/$IPA_NAME"
          echo "IPA created: $CM_BUILD_DIR/$IPA_NAME"
          ls -lh "$CM_BUILD_DIR/$IPA_NAME"
          # Confirm Payload/ is at the root of the zip (AltStore requirement)
          unzip -l "$CM_BUILD_DIR/$IPA_NAME" | head -5

      - name: Run unit tests
        script: |
          set -eo pipefail
          xcodebuild test \
            -scheme LiftKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:LiftKitTests \
            2>&1 | tee /tmp/test.log || true
        ignore_failure: true

    artifacts:
      - "$CM_BUILD_DIR/LiftKit_v*_b*.ipa"
      - "$CM_BUILD_DIR/LiftKit.xcarchive"
      - "/tmp/xcodebuild.log"
      - "/tmp/test.log"

    publishing:
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # Signed App Store / TestFlight build.
  #
  # ONE-TIME SETUP IN THE CODEMAGIC UI (cannot be done from this file):
  #   1. Apple Developer Program enrollment, then register BOTH App IDs at
  #      developer.apple.com: `com.ferrixguild.liftkit` and `com.ferrixguild.liftkit.widgets`.
  #      On the app's App ID enable HealthKit, In-App Purchase, and Push
  #      Notifications (Live Activities).
  #   2. Codemagic > Teams/Personal > Integrations > "App Store Connect":
  #      upload an App Store Connect API key (Issuer ID, Key ID, .p8 file).
  #      Name it EXACTLY the same string used in `integrations:` below.
  #   3. App record created in App Store Connect (so TestFlight has a target).
  #   4. Create a Codemagic environment-variable GROUP named `signing` with a
  #      secure var `CERTIFICATE_PRIVATE_KEY` = a PEM RSA private key
  #      (generate with `openssl genrsa 2048`). Codemagic uses it to create and
  #      reuse one Apple Distribution certificate — App Store Connect never
  #      hands back a cert's private key, so CI must own one.
  #   5. For the paywall to load: sign the Paid Apps agreement (tax + banking)
  #      and create the non-consumable IAP `com.ferrixguild.liftkit.pro`.
  #
  # Trigger: manual (no `triggering:` block) so it only runs when you start it
  # from the Codemagic UI — keeps it deliberate and saves build minutes.
  # To auto-cut a build on a git tag instead, add:
  #   triggering: { events: [tag], tag_patterns: [{ pattern: 'v*', include: true }] }
  # ---------------------------------------------------------------------------
  ios-testflight:
    name: LiftKit — TestFlight (signed)
    max_build_duration: 60

    integrations:
      app_store_connect: "liftkit app manager"   # <-- must EXACTLY match the integration name in Codemagic UI

    environment:
      # App Store submissions must be built with the iOS 26 SDK (required since
      # Apr 2026), so the signed workflow tracks the latest Xcode — unlike the
      # AltStore workflow above, where the SDK version doesn't matter. Building
      # with the iOS 26 SDK means the app renders in Liquid Glass; verify that
      # on-device (or opt out via UIDesignRequiresCompatibility in Info.plist).
      xcode: latest
      groups:
        - signing   # must define CERTIFICATE_PRIVATE_KEY (a distribution-cert private key)

    scripts:
      - name: Set version and build number
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          VERSION=$(grep -oE 'static let current = "[0-9.]+"' LiftKit/Views/Settings/SettingsView.swift | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Version $VERSION, build $BUILD"
          PLIST="LiftKit/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          [ -n "$VERSION" ] && /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          # The widget extension's version must match the app's.
          WIDGET_PLIST="LiftKitWidgets/Info.plist"
          if [ -f "$WIDGET_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$WIDGET_PLIST"
            [ -n "$VERSION" ] && /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$WIDGET_PLIST"
          fi

      - name: Set up code signing
        script: |
          set -eo pipefail
          # Manual App Store signing via the app_store_connect API key. Fetch —
          # creating if missing — an App Store profile + distribution cert for
          # BOTH the app and the widget extension, add the cert to the build
          # keychain, then point the project at the fetched profiles.
          #
          # PREREQUISITE: both App IDs must already be registered at
          # developer.apple.com, and `com.ferrixguild.liftkit` must have
          # HealthKit, In-App Purchase, and Push Notifications enabled — else the
          # created profile won't carry those entitlements and the build fails
          # with a "doesn't include the … entitlement" error.
          keychain initialize
          # --certificate-key supplies the distribution cert's private key.
          # App Store Connect only serves the PUBLIC cert, so without a
          # persistent key you get "Cannot save Signing Certificates without
          # certificate private key". With it, --create makes ONE Apple
          # Distribution cert on the first run and reuses it every build.
          app-store-connect fetch-signing-files "com.ferrixguild.liftkit" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          app-store-connect fetch-signing-files "com.ferrixguild.liftkit.widgets" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -eo pipefail
          xcode-project build-ipa \
            --project LiftKit.xcodeproj \
            --scheme LiftKit

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # To push straight to external testers, list beta group names here:
        # beta_groups:
        #   - "External Testers"
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true
