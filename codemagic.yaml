workflows:
  altstore-unsigned-ipa:
    name: LiftKit — Unsigned IPA (AltStore)
    max_build_duration: 60

    environment:
      xcode: 16.2
      groups: []

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    scripts:
      - name: Set build number from git commit count
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "Setting CFBundleVersion to $BUILD"
          PLIST="LiftKit/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          fi

      - name: Build unsigned archive
        script: |
          set -eo pipefail
          xcodebuild archive \
            -scheme LiftKit \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/LiftKit.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="--timestamp=none" \
            SKIP_INSTALL=NO \
            INSTALL_PATH="/Applications" \
            2>&1 | tee /tmp/xcodebuild.log

          echo "--- Archive contents ---"
          find "$CM_BUILD_DIR/LiftKit.xcarchive" -maxdepth 4 -ls 2>/dev/null || true

          if [ ! -d "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications" ]; then
            echo "ERROR: Archive produced no Applications directory."
            grep -E "error:|warning:|Build FAILED" /tmp/xcodebuild.log | tail -40
            exit 1
          fi

      - name: Package as unsigned .ipa for AltStore
        script: |
          set -eo pipefail
          APP_PATH=$(find "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive"
            ls -la "$CM_BUILD_DIR/LiftKit.xcarchive/Products/Applications/" || true
            exit 1
          fi
          echo "Packaging: $APP_PATH"

          # Verify the binary exists inside the .app
          BUNDLE_EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          echo "CFBundleExecutable: $BUNDLE_EXEC"
          if [ -z "$BUNDLE_EXEC" ]; then
            echo "ERROR: CFBundleExecutable missing from Info.plist"
            cat "$APP_PATH/Info.plist" || true
            exit 1
          fi
          if [ ! -f "$APP_PATH/$BUNDLE_EXEC" ]; then
            echo "ERROR: Binary $BUNDLE_EXEC not found in .app"
            ls -la "$APP_PATH/"
            exit 1
          fi
          echo "Binary found: $APP_PATH/$BUNDLE_EXEC ($(wc -c < "$APP_PATH/$BUNDLE_EXEC") bytes)"

          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r "LiftKit_unsigned.ipa" Payload
          echo "IPA created: $(ls -lh "$CM_BUILD_DIR/LiftKit_unsigned.ipa")"
          echo "--- IPA contents ---"
          unzip -l "$CM_BUILD_DIR/LiftKit_unsigned.ipa" | head -30

      - name: Run unit tests
        script: |
          set -eo pipefail
          xcodebuild test \
            -scheme LiftKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:LiftKitTests \
            2>&1 | tee /tmp/test.log || true
        ignore_failure: true

    artifacts:
      - "$CM_BUILD_DIR/LiftKit_unsigned.ipa"
      - "$CM_BUILD_DIR/LiftKit.xcarchive"
      - "/tmp/xcodebuild.log"
      - "/tmp/test.log"

    publishing:
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true
