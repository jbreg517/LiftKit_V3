workflows:
  altstore-unsigned-ipa:
    name: LiftKit — Unsigned IPA (AltStore)
    max_build_duration: 60

    environment:
      xcode: 16.2
      groups: []

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    scripts:
      - name: Set build number from git commit count
        script: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "Setting CFBundleVersion to $BUILD"
          PLIST="LiftKit/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST"
          fi

      - name: Build unsigned app
        script: |
          set -eo pipefail
          BUILD_DIR="$CM_BUILD_DIR/build"

          xcodebuild build \
            -scheme LiftKit \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$BUILD_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="--timestamp=none" \
            2>&1 | tee /tmp/xcodebuild.log

          APP_PATH="$BUILD_DIR/Build/Products/Release-iphoneos/LiftKit.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App bundle not found at expected path: $APP_PATH"
            echo "--- Searching for .app bundles ---"
            find "$BUILD_DIR" -name "*.app" -maxdepth 6 2>/dev/null || true
            grep -E "^.*(error:|Build FAILED)" /tmp/xcodebuild.log | tail -30
            exit 1
          fi

          echo "App bundle found: $APP_PATH"
          ls -la "$APP_PATH/"

      - name: Package as unsigned .ipa for AltStore
        script: |
          set -eo pipefail
          BUILD_DIR="$CM_BUILD_DIR/build"
          APP_PATH="$BUILD_DIR/Build/Products/Release-iphoneos/LiftKit.app"

          # Verify binary
          BUNDLE_EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          echo "CFBundleExecutable: $BUNDLE_EXEC"
          echo "CFBundleIdentifier: $BUNDLE_ID"
          if [ -z "$BUNDLE_EXEC" ] || [ ! -f "$APP_PATH/$BUNDLE_EXEC" ]; then
            echo "ERROR: Binary not found"
            ls -la "$APP_PATH/"
            exit 1
          fi
          echo "Binary: $APP_PATH/$BUNDLE_EXEC ($(wc -c < "$APP_PATH/$BUNDLE_EXEC") bytes)"

          # Package using ditto (preserves symlinks, permissions, extended attrs)
          PAYLOAD_DIR="$CM_BUILD_DIR/Payload"
          IPA_PATH="$CM_BUILD_DIR/LiftKit_unsigned.ipa"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          ditto "$APP_PATH" "$PAYLOAD_DIR/LiftKit.app"
          ditto -c -k --sequesterRsrc --keepParent "$PAYLOAD_DIR" "$IPA_PATH"

          echo "IPA created: $(ls -lh "$IPA_PATH")"
          echo "--- IPA structure ---"
          unzip -l "$IPA_PATH" | head -20

      - name: Run unit tests
        script: |
          set -eo pipefail
          xcodebuild test \
            -scheme LiftKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:LiftKitTests \
            2>&1 | tee /tmp/test.log || true
        ignore_failure: true

    artifacts:
      - "$CM_BUILD_DIR/LiftKit_unsigned.ipa"
      - "/tmp/xcodebuild.log"
      - "/tmp/test.log"

    publishing:
      email:
        recipients:
          - jbreg517@gmail.com
        notify:
          success: true
          failure: true
